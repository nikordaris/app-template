name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: 1
  NODE_VERSION: '20'

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Enable Corepack
        run: corepack enable
      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            yarn-${{ runner.os }}-
      - name: Install
        run: yarn install --immutable

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      - run: yarn turbo run typecheck

  lint:
    name: lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      - run: yarn turbo run lint

  format-check:
    name: format-check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      - run: yarn format:check

  test:
    name: test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      - run: yarn turbo run test

  codegen-drift:
    name: codegen-drift
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            ~/.yarn/berry/cache
          key: yarn-${{ runner.os }}-${{ hashFiles('yarn.lock') }}
      - run: yarn install --immutable
      # Phase 00 stub: there is no deployed Amplify schema yet, so codegen
      # is a no-op. Phase 01 swaps this for a real `ampx generate
      # graphql-client-code` against a CI branch backend, then asserts
      # `git diff --exit-code packages/api/src/generated`.
      - run: yarn workspace @app/api codegen
      - name: Assert no drift in generated artifacts
        run: |
          if ! git diff --quiet -- packages/api/src/generated; then
            echo "::error::Generated GraphQL artifacts drifted from the schema."
            git diff -- packages/api/src/generated
            exit 1
          fi
